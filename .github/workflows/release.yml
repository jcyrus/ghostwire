name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: ghostwire-darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: ghostwire-darwin-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: ghostwire-linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: ghostwire-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }} -p ghostwire-client --bin ghostwire

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          cp ghostwire ../../../${{ matrix.asset_name }}
          cd -

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          cp ghostwire.exe ../../../${{ matrix.asset_name }}
          cd -

      - name: Generate checksums
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 "${{ matrix.asset_name }}").Hash.ToLower()
          "$hash  ${{ matrix.asset_name }}" | Out-File -FilePath "${{ matrix.asset_name }}.sha256" -Encoding ascii -NoNewline

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset_name }}
            ${{ matrix.asset_name }}.sha256
          fail_on_missing: false

  notify-distribution:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Homebrew Tap update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TAP_UPDATE_TOKEN }}
          repository: jcyrus/homebrew-tap
          event-type: update-formula
          client-payload: '{"project": "ghostwire", "version": "${{ github.ref_name }}"}'

      - name: Trigger Scoop Bucket update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TAP_UPDATE_TOKEN }}
          repository: jcyrus/scoop-bucket
          event-type: update-manifest
          client-payload: '{"project": "ghostwire", "version": "${{ github.ref_name }}"}'
